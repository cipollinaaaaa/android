<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Venusian Gems">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="venusian.png">
  <title>Venusian Gems</title>
  <style>
    body {
      background-color: #000;
      color: white;
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 20px;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    
    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 600px;
    }
    
    .info-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
      width: 100%;
      text-align: center;
    }
    
    h1 {
      font-size: 2.5em;
      color: #00ffe7;
      text-shadow: 0 0 10px #00ffe7, 0 0 20px #00ffe7;
      margin: 0 0 10px 0;
    }
    
    .score-timer-container {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 10px;
    }
    
    .score-timer {
      font-size: 1.6em;
      color: #fff;
      text-shadow: 0 0 5px #fff;
      padding: 5px 15px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 10px;
    }
    
    #timer {
      color: #ff0033;
      text-shadow: 0 0 5px #ff0033;
      font-weight: bold;
    }
    
    #resetButton {
      padding: 10px 20px;
      font-size: 1.2em;
      background-color: #ff0033;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    
    #board {
      width: 586px;
      height: 586px;
      display: grid;
      grid-template-columns: repeat(8, 68px);
      gap: 6px;
      margin: 0;
      position: relative;
      z-index: 0;
    }
    
    .cell {
      width: 68px;
      height: 68px;
      border-radius: 18px;
      cursor: pointer;
      transition: transform 0.2s ease-in-out, box-shadow 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: bold;
      background: linear-gradient(145deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
      box-shadow: inset 0 0 8px rgba(255,255,255,0.4), inset 0 5px 12px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.4);
      color: white;
      user-select: none;
      touch-action: manipulation;
    }
    
    .cell.selected {
      transform: scale(1.1);
      box-shadow: inset 0 0 10px rgba(255,255,255,0.6), 0 0 15px #fff, 0 0 30px #fff;
      z-index: 5;
    }
    
    .red { background-color: #ff0033; }
    .yellow { background-color: #ffdd00; color: #333; }
    .green { background-color: #33cc33; }
    .pink { background-color: #ff66cc; }
    .purple { background-color: #aa33ff; }
    .orange { background-color: #ff8800; color: #333; }
    .aqua { background-color: #00cccc; }
    
    .venusian {
      background-image: url('venusian.png');
      background-size: cover;
      background-position: center;
      color: transparent;
    }
    
    .mano {
      background-image: url('mano.gif');
      background-size: cover;
      background-position: center;
      color: transparent;
    }
    
    #lightning {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
    }
    
    .flash {
      animation: flashUp 0.2s forwards;
    }
    
    @keyframes flashUp {
      0% { opacity: 0.8; }
      100% { opacity: 0; }
    }
    
    #messageOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(255,255,255,0.1), rgba(0,0,0,0.95));
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      backdrop-filter: blur(4px);
      flex-direction: column;
      text-align: center;
    }
    
    #messageOverlay h2 {
      font-size: 2em;
      color: #ff0;
      text-shadow: 0 0 10px #ff0, 0 0 20px #ff0;
      animation: blink 1s infinite;
      margin-bottom: 20px;
      padding: 0 20px;
    }
    
    #messageOverlay .message-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }
    
    #messageOverlay img.message-img {
      width: 100px;
      height: auto;
      animation: float 2s infinite ease-in-out;
    }
    
    #messageOverlay button.message-reset-button {
      margin-top: 30px;
      padding: 12px 24px;
      font-size: 1.2em;
      background-color: #ff0033;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    
    #messageOverlay.game-over h2 {
      color: #ff0033;
      text-shadow: 0 0 10px #ff0033, 0 0 20px #ff0033;
    }
    
    .instructions {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
      color: #00ffe7;
    }
    
    @media (max-width: 700px) {
      #board {
        width: calc(100vw - 40px);
        height: auto;
        grid-template-columns: repeat(8, 1fr);
        gap: 4px;
      }
      .cell {
        width: 100%;
        height: auto;
        aspect-ratio: 1 / 1;
        font-size: 5vw;
      }
      .info-panel {
        margin-bottom: 10px;
      }
      h1 {
        font-size: 1.8em;
      }
      .score-timer {
        font-size: 1.2em;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="info-panel">
      <h1>Venusian Gems</h1>
      <div class="score-timer-container">
        <div class="score-timer" id="score">Score: 0</div>
        <div class="score-timer" id="timer">Time: 60</div>
      </div>
      <button id="resetButton" onclick="resetGame()">🔄 Reset</button>
    </div>
    <div id="board"></div>
    <div class="instructions">✨ Toca una gema y luego otra adyacente para intercambiarlas ✨</div>
  </div>
  
  <div id="lightning"></div>

  <!-- Audios -->
  <audio id="matchSoundThree" src="venusci.mp3" preload="auto"></audio>
  <audio id="matchSoundFour" src="venusciously.mp3" preload="auto"></audio>
  <audio id="backgroundMusic" src="venusound.mp3" loop preload="auto"></audio>
  <audio id="winFanfareSound" src="venusliscious.mp3" preload="auto"></audio>
  <audio id="gameOverSound" src="loser.mp3" preload="auto"></audio>

  <!-- Overlay Mensaje -->
  <div id="messageOverlay">
    <div class="message-content">
      <h2 id="messageTitle"></h2>
      <img id="messageImg1" src="" alt="" class="message-img">
      <img id="messageImg2" src="" alt="" class="message-img">
      <button class="message-reset-button" onclick="resetGame()">Play Again ➡️</button>
    </div>
  </div>

  <script>
    const board = document.getElementById("board");
    const scoreDisplay = document.getElementById("score");
    const timerDisplay = document.getElementById("timer");
    const messageOverlay = document.getElementById("messageOverlay");
    const messageTitle = document.getElementById("messageTitle");
    const messageImg1 = document.getElementById("messageImg1");
    const messageImg2 = document.getElementById("messageImg2");
    const lightning = document.getElementById("lightning");
    const htmlMatchSoundThree = document.getElementById("matchSoundThree");
    const htmlMatchSoundFour = document.getElementById("matchSoundFour");
    const htmlBackgroundMusic = document.getElementById("backgroundMusic");
    const htmlWinFanfareSound = document.getElementById("winFanfareSound");
    const htmlGameOverSound = document.getElementById("gameOverSound");

    let audioContext = null;
    let backgroundMusicPlaying = false;
    let winSoundLoadedBuffer = null;
    let loseSoundLoadedBuffer = null;
    let gameLoop;
    let timerCountdown;
    let timeLeft = 60;
    let gameActive = false;

    const letterMap = {
      red: 'V', yellow: 'E', green: 'N', pink: 'U',
      purple: 'S', orange: 'I', aqua: 'A', venusian: 'N', mano: 'N'
    };

    const colors = ["red", "yellow", "green", "pink", "purple", "orange", "aqua", "venusian", "mano"];
    const boardSize = 8;
    const totalCells = boardSize * boardSize;
    let cells = [];
    let selectedCell = null;
    let score = 0;

    // --- AudioContext ---
    async function initializeAudioContextAndLoadSounds() {
      if (!window.AudioContext && !window.webkitAudioContext) {
        console.warn("Web Audio API no soportado.");
        return;
      }
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }

      const resumeContextOnGesture = () => {
        if (audioContext && audioContext.state === 'suspended') {
          audioContext.resume().then(() => {
            document.documentElement.removeEventListener('mousedown', resumeContextOnGesture);
            document.documentElement.removeEventListener('keydown', resumeContextOnGesture);
            document.documentElement.removeEventListener('touchstart', resumeContextOnGesture);
            if (!backgroundMusicPlaying && gameActive) {
              htmlBackgroundMusic.play().catch(e => console.warn("Fallo al reproducir música:", e));
              backgroundMusicPlaying = true;
            }
          });
        }
      };

      document.documentElement.addEventListener('mousedown', resumeContextOnGesture, { once: true });
      document.documentElement.addEventListener('keydown', resumeContextOnGesture, { once: true });
      document.documentElement.addEventListener('touchstart', resumeContextOnGesture, { once: true });

      try {
        winSoundLoadedBuffer = await loadSoundBuffer(htmlWinFanfareSound.src);
        loseSoundLoadedBuffer = await loadSoundBuffer(htmlGameOverSound.src);
      } catch (e) {
        console.error("Error cargando sonidos:", e);
      }
    }

    async function loadSoundBuffer(url) {
      if (!audioContext) throw new Error("AudioContext no listo.");
      const response = await fetch(url);
      const arrayBuffer = await response.arrayBuffer();
      return await audioContext.decodeAudioData(arrayBuffer);
    }

    function playAudioContextSound(buffer, volume = 1.0) {
      if (!audioContext || !buffer) return false;
      const playSound = () => {
        const source = audioContext.createBufferSource();
        source.buffer = buffer;
        const gainNode = audioContext.createGain();
        gainNode.gain.value = volume;
        source.connect(gainNode).connect(audioContext.destination);
        source.start(0);
      };
      if (audioContext.state === 'suspended') {
        audioContext.resume().then(playSound);
      } else {
        playSound();
      }
      return true;
    }

    // --- Lógica del juego ---
    function getRandomColor() {
      return colors[Math.floor(Math.random() * colors.length)];
    }

    function handleCellClick(cellId) {
      if (!gameActive) {
        handleFirstGameInteraction();
      }
      
      if (selectedCell === null) {
        selectedCell = cellId;
        cells[cellId].classList.add("selected");
      } else if (selectedCell === cellId) {
        cells[cellId].classList.remove("selected");
        selectedCell = null;
      } else {
        const rowSelected = Math.floor(selectedCell / boardSize);
        const colSelected = selectedCell % boardSize;
        const rowNew = Math.floor(cellId / boardSize);
        const colNew = cellId % boardSize;
        
        const isAdjacent = (
          (Math.abs(rowSelected - rowNew) === 1 && colSelected === colNew) ||
          (Math.abs(colSelected - colNew) === 1 && rowSelected === rowNew)
        );
        
        if (isAdjacent) {
          cells[selectedCell].classList.remove("selected");
          swapGems(selectedCell, cellId);
          checkMatchesAndRefill();
          selectedCell = null;
        } else {
          cells[selectedCell].classList.remove("selected");
          selectedCell = cellId;
          cells[cellId].classList.add("selected");
        }
      }
    }

    function createBoard() {
      cells = [];
      board.innerHTML = '';
      for (let i = 0; i < totalCells; i++) {
        const cell = document.createElement("div");
        cell.setAttribute("id", i);
        cell.classList.add("cell");
        const color = getRandomColor();
        cell.classList.add(color);
        cell.textContent = letterMap[color] || "";
        
        cell.addEventListener("mousedown", (e) => {
          e.preventDefault();
          handleCellClick(i);
        });
        cell.addEventListener("touchstart", (e) => {
          e.preventDefault();
          handleCellClick(i);
        });
        
        board.appendChild(cell);
        cells.push(cell);
      }
    }

    function handleFirstGameInteraction() {
      if (!gameActive) {
        if (!backgroundMusicPlaying) {
          htmlBackgroundMusic.play().catch(e => console.warn("Música falló al iniciar.", e));
          backgroundMusicPlaying = true;
        }
        startGameLoop();
        gameActive = true;
      }
    }

    function resetGame() {
      gameActive = false;
      clearInterval(gameLoop);
      clearInterval(timerCountdown);
      messageOverlay.style.display = "none";
      messageOverlay.classList.remove('game-over');
      score = 0;
      selectedCell = null;
      updateScore();
      createBoard();
      if (htmlBackgroundMusic) {
        htmlBackgroundMusic.pause();
        htmlBackgroundMusic.currentTime = 0;
      }
      backgroundMusicPlaying = false;
    }

    function startGameLoop() {
      clearInterval(gameLoop);
      clearInterval(timerCountdown);
      timeLeft = 60;
      timerDisplay.textContent = `Time: ${timeLeft}`;
      gameLoop = setInterval(() => {
        if (gameActive) {
          checkMatchesAndRefill();
          checkWin();
        }
      }, 200);
      timerCountdown = setInterval(() => {
        if (gameActive) {
          timeLeft--;
          timerDisplay.textContent = `Time: ${timeLeft}`;
          if (timeLeft <= 0) endGameByTime();
        }
      }, 1000);
    }

    function swapGems(id1, id2) {
      const cell1 = cells[id1];
      const cell2 = cells[id2];
      const tempColor1 = cell1.classList[1];
      const tempText1 = cell1.textContent;
      const tempColor2 = cell2.classList[1];
      const tempText2 = cell2.textContent;
      cell1.className = "cell";
      if (tempColor2) cell1.classList.add(tempColor2);
      cell1.textContent = tempText2;
      cell2.className = "cell";
      if (tempColor1) cell2.classList.add(tempColor1);
      cell2.textContent = tempText1;
    }

    function updateScore() {
      scoreDisplay.textContent = "Score: " + score;
    }

    function collectMatches() {
      let matchedIndexes = new Set();
      for (let i = 0; i < totalCells; i++) {
        if (i % boardSize <= boardSize - 3) {
          const color1 = cells[i]?.classList[1];
          if (!color1 || color1 === "cell") continue;
          if (cells[i+1]?.classList[1] === color1 && cells[i+2]?.classList[1] === color1) {
            matchedIndexes.add(i); matchedIndexes.add(i+1); matchedIndexes.add(i+2);
            if (i % boardSize <= boardSize - 4 && cells[i+3]?.classList[1] === color1) {
              matchedIndexes.add(i+3);
              if (i % boardSize <= boardSize - 5 && cells[i+4]?.classList[1] === color1) {
                matchedIndexes.add(i+4);
              }
            }
          }
        }
      }
      for (let i = 0; i < totalCells; i++) {
        if (i < totalCells - (boardSize * 2)) {
          const color1 = cells[i]?.classList[1];
          if (!color1 || color1 === "cell") continue;
          if (cells[i+boardSize]?.classList[1] === color1 && cells[i+(boardSize*2)]?.classList[1] === color1) {
            matchedIndexes.add(i); matchedIndexes.add(i+boardSize); matchedIndexes.add(i+(boardSize*2));
            if (i < totalCells - (boardSize * 3) && cells[i+(boardSize*3)]?.classList[1] === color1) {
              matchedIndexes.add(i+(boardSize*3));
              if (i < totalCells - (boardSize * 4) && cells[i+(boardSize*4)]?.classList[1] === color1) {
                matchedIndexes.add(i+(boardSize*4));
              }
            }
          }
        }
      }
      return Array.from(matchedIndexes);
    }

    function checkMatchesAndRefill() {
      let iteration = 0;
      do {
        let matches = collectMatches();
        if (matches.length > 0) {
          playMatchSound(matches.length >= 4 ? "quad" : "triple");
          showLightningFlash();
          matches.forEach(idx => {
            cells[idx].className = "cell";
            cells[idx].textContent = "";
            score += 10;
          });
          updateScore();
          moveGemsDown();
        } else break;
      } while (++iteration < 10);
    }

    function playMatchSound(type = "triple") {
      const sound = type === "quad" ? htmlMatchSoundFour : htmlMatchSoundThree;
      sound.currentTime = 0;
      sound.play().catch(console.error);
    }

    function moveGemsDown() {
      for (let col = 0; col < boardSize; col++) {
        let emptySpots = [];
        for (let row = boardSize - 1; row >= 0; row--) {
          const idx = row * boardSize + col;
          if (cells[idx].classList.length === 1) {
            emptySpots.push(idx);
          } else if (emptySpots.length > 0) {
            const targetIdx = emptySpots.shift();
            cells[targetIdx].className = "cell";
            cells[targetIdx].classList.add(cells[idx].classList[1]);
            cells[targetIdx].textContent = cells[idx].textContent;
            cells[idx].className = "cell";
            cells[idx].textContent = "";
            emptySpots.push(idx);
          }
        }
      }
      for (let i = 0; i < totalCells; i++) {
        if (cells[i].classList.length === 1) {
          const newColor = getRandomColor();
          cells[i].classList.add(newColor);
          cells[i].textContent = letterMap[newColor] || "";
        }
      }
    }

    function showLightningFlash() {
      lightning.classList.add("flash");
      setTimeout(() => lightning.classList.remove("flash"), 200);
    }

    function checkWin() {
      if (!gameActive) return;
      const boardLetters = cells.map(cell => {
        const classes = Array.from(cell.classList);
        if (classes.includes('venusian') || classes.includes('mano')) return 'N';
        return cell.textContent || "";
      }).join('');
      const targetWord = "VENUSIAN";
      for (let row = 0; row < boardSize; row++) {
        const rowStr = boardLetters.substring(row * boardSize, (row + 1) * boardSize);
        if (rowStr.includes(targetWord)) {
          showWinMessage();
          return;
        }
      }
      for (let col = 0; col < boardSize; col++) {
        let colStr = '';
        for (let row = 0; row < boardSize; row++) {
          const classes = Array.from(cells[col + (row * boardSize)].classList);
          colStr += classes.includes('venusian') || classes.includes('mano') ? 'N' : cells[col + (row * boardSize)].textContent || "";
        }
        if (colStr.includes(targetWord)) {
          showWinMessage();
          return;
        }
      }
    }

    function showWinMessage() {
      gameActive = false;
      clearInterval(gameLoop);
      clearInterval(timerCountdown);
      if (htmlBackgroundMusic) {
        htmlBackgroundMusic.pause();
        htmlBackgroundMusic.currentTime = 0;
      }
      messageOverlay.style.display = "flex";
      messageTitle.textContent = "VENUSLICIOUS, you are Venusian People!!! 🚀";
      messageImg1.src = "mano.gif";
      messageImg2.src = "venusian.png";
      messageOverlay.classList.remove('game-over');
      if (winSoundLoadedBuffer) playAudioContextSound(winSoundLoadedBuffer, 1.0);
      else htmlWinFanfareSound.play().catch(console.error);
    }

    function endGameByTime() {
      gameActive = false;
      clearInterval(gameLoop);
      clearInterval(timerCountdown);
      if (htmlBackgroundMusic) {
        htmlBackgroundMusic.pause();
        htmlBackgroundMusic.currentTime = 0;
      }
      messageOverlay.style.display = "flex";
      messageTitle.textContent = "Time's Up! Game Over!";
      messageImg1.src = "mano.gif";
      messageImg2.src = "venusian.png";
      messageOverlay.classList.add('game-over');
      if (loseSoundLoadedBuffer) playAudioContextSound(loseSoundLoadedBuffer, 1.0);
      else htmlGameOverSound.play().catch(console.error);
    }

    // --- Inicialización ---
    initializeAudioContextAndLoadSounds();
    createBoard();
  </script>
</body>
</html>
